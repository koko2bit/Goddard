name: Release App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BUN_VERSION: 1.3.11

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            runs_on: macos-14
          - name: macOS x64
            runs_on: macos-13
          - name: Windows x64
            runs_on: windows-2022
          - name: Linux x64
            runs_on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build stable release artifacts
        run: bun --cwd app run build:stable

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-artifacts-${{ matrix.runs_on }}
          path: app/artifacts/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Find previous stable release
        id: previous-release
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          previous_tag="$(gh api "repos/${{ github.repository }}/releases/latest" --jq '.tag_name' 2>/dev/null || true)"

          if [ -n "$previous_tag" ] && [ "$previous_tag" != "$CURRENT_TAG" ]; then
            echo "tag=$previous_tag" >> "$GITHUB_OUTPUT"
          fi

      - name: Download historical patch assets
        if: steps.previous-release.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PREVIOUS_TAG: ${{ steps.previous-release.outputs.tag }}
        run: gh release download "$PREVIOUS_TAG" --pattern '*.patch' --dir release-artifacts --clobber

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --generate-notes
          fi

          gh release upload "$TAG_NAME" release-artifacts/* --clobber
