name: Sync Subrepos

on:
  workflow_dispatch:
  push:
    branches:
      - main
    # Optional: Only trigger this action if files in the subrepos actually changed
    paths:
      - "daemon/**"
      - "cmd/**"
      - "core/**"

# Ensure only one sync runs at a time to prevent git conflicts on the .gitrepo files
concurrency:
  group: sync-subrepos
  cancel-in-progress: false

jobs:
  sync:
    name: git-subrepo push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Monorepo
        uses: actions/checkout@v4
        with:
          # REQUIRED: git-subrepo needs the full git history to calculate splits
          fetch-depth: 0
          # Use the PAT so we have permissions to push back to this repo AND out to the subrepos
          token: ${{ secrets.SYNC_PAT }}

      - name: Setup Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Inject the PAT into Git so git-subrepo can push to external HTTPS URLs
          git config --global url."https://${{ secrets.SYNC_PAT }}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://${{ secrets.SYNC_PAT }}@github.com/".insteadOf "git@github.com:"

      - name: Install git-subrepo
        run: |
          git clone https://github.com/ingydotnet/git-subrepo.git ~/.git-subrepo
          echo "GIT_SUBREPO_ROOT=$HOME/.git-subrepo" >> $GITHUB_ENV
          echo "$HOME/.git-subrepo/lib" >> $GITHUB_PATH

      - name: Push subrepos
        run: |
          # Create and checkout a temporary branch for subrepo pushes
          git checkout -b temp-sync-branch

          # If one subrepo has no changes, don't fail the whole job
          git subrepo push daemon || true
          git subrepo push cmd || true
          git subrepo push core || true

      - name: Push .gitrepo updates to monorepo
        run: |
          # Check out main branch and squash merge the temporary branch
          git checkout main
          git merge --squash temp-sync-branch

          # If there are changes, commit them with a unified message and push
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync subrepos"
            git push origin main
          else
            echo "No changes to sync."
          fi
